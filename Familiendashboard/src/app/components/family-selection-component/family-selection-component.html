<div class="flex h-screen items-center justify-center bg-base-200">

  <div class="absolute top-4 left-4">
    <app-theme-switch-component></app-theme-switch-component>
  </div>

  <router-outlet></router-outlet>

  @if (!isChildRoute()) {
    <div class="card w-full max-w-lg bg-base-100 shadow-xl">
      <div class="card-body">
        <h2 class="card-title text-3xl font-bold mb-2 text-base-content">Family Setup</h2>
        <p class="text-base-content mb-6">Was möchtest du tun?</p>

        @if(errorMessage) {
          <div class="alert alert-error mb-4">
            <span>{{ errorMessage }}</span>
          </div>
        }

        <div class="flex flex-col gap-4">

          <button
            (click)="onJoinFamily()"
            [disabled]="isLoading"
            class="btn btn-lg btn-primary w-full">
            @if(isLoading) {
              <span class="loading loading-spinner loading-sm"></span>
            }
            <span>Einer Familie beitreten</span>
          </button>

          <button
            (click)="onCreateFamily()"
            [disabled]="isLoading"
            class="btn btn-lg btn-secondary w-full">
            @if(isLoading) {
              <span class="loading loading-spinner loading-sm"></span>
            }
            <span>Neue Familie erstellen</span>
          </button>
        </div>

        <div class="divider"></div>

        <div class="text-center">
          <button
            (click)="onCancel()"
            class="link link-hover text-sm text-base-content font-semibold">
            Zurück zum Login
          </button>
        </div>
      </div>
    </div>
  }
</div>
